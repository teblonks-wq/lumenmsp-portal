# [C] Portal security headers — clears the RoboShadow/ZAP "Low" findings (CSP, CORP/Spectre,
# Cache-Control, plus standard hardening). Applied at NGINX, so it needs only an nginx reload —
# NO Portal deploy, NO staff logout.
#
# Findings addressed (portal.lumenmsp.co.uk, scan 2026-06-25):
#   - CSP: Notices                                  -> Content-Security-Policy
#   - Insufficient Site Isolation (Spectre)         -> Cross-Origin-Resource-Policy + COOP
#   - Incomplete/No Cache-control & Pragma          -> Cache-Control / Pragma on app pages
#   - (hardening extras)                            -> X-Content-Type-Options, Referrer-Policy, X-Frame-Options
# The "Absence of Anti-CSRF Tokens" finding is APP-level, not a header — see [C] security-remediation.md.
#
# HOW TO APPLY
#   1. Paste the `server { ... }` additions below into the portal vhost
#      (/etc/nginx/sites-available/portal.lumenmsp.co.uk), inside the existing `server {}`.
#   2. `sudo nginx -t`  then  `sudo systemctl reload nginx`   (reload, not restart)
#   3. Re-scan / check headers:  curl -sI https://portal.lumenmsp.co.uk | sort
#
# IMPORTANT NGINX QUIRK: add_header does NOT inherit into a `location` that defines its own
# add_header. The /static and the chat-widget location blocks below therefore RE-DECLARE the
# headers they need. Keep that in mind if you add more location blocks.

# ─────────────────────────────────────────────────────────────────────────────
# Put these directly inside the portal `server { }` block:
# ─────────────────────────────────────────────────────────────────────────────

  # --- Baseline hardening (apply to all responses) ---
  add_header X-Content-Type-Options        "nosniff"                      always;
  add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options               "SAMEORIGIN"                   always;
  add_header Cross-Origin-Opener-Policy    "same-origin"                  always;
  add_header Cross-Origin-Resource-Policy  "same-origin"                  always;

  # --- Content-Security-Policy ---
  # NOTE: the Portal renders EJS with some inline scripts/handlers, so this starter policy
  # allows 'unsafe-inline'. That still CLEARS the "no CSP" finding. Tighten later by moving
  # to per-request nonces and dropping 'unsafe-inline'. Consider deploying as
  # Content-Security-Policy-Report-Only FIRST and watching the console before enforcing.
  add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline'; \
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
font-src 'self' https://fonts.gstatic.com data:; \
img-src 'self' data: blob:; \
connect-src 'self' https: wss:; \
frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  # --- Cache-Control: app pages should not be cached (ZAP flagged "/", "/login-page") ---
  # Default to no-store; the /static override below restores caching for assets.
  add_header Cache-Control "no-store" always;

  # ─── location overrides ───────────────────────────────────────────────────

  # Static assets: DO cache, and RE-state the baseline headers (add_header doesn't inherit here).
  location /static/ {
    add_header X-Content-Type-Options       "nosniff"                       always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin"                    always;
    add_header Cache-Control                "public, max-age=86400"          always;
    # ...keep your existing static root/try_files/proxy_pass here...
  }

  # CRITICAL: the live-chat widget is embedded CROSS-ORIGIN by the website
  # (www.lumenmsp.co.uk loads https://portal.lumenmsp.co.uk/static/js/chat-widget.js).
  # A same-origin CORP would BLOCK it. Serve this one file as cross-origin.
  location = /static/js/chat-widget.js {
    add_header Cross-Origin-Resource-Policy "cross-origin"            always;
    add_header Cache-Control                "public, max-age=3600"    always;
    add_header X-Content-Type-Options       "nosniff"                always;
    # ...keep your existing static serving directive for this path...
  }

# ─────────────────────────────────────────────────────────────────────────────
# Notes
#  - These add_header lines also belong on the broadband-api / website vhost later, but the
#    website CORS (api.* + the embedded widget) needs its own review — do that with the
#    website's own scan report (pending).
#  - If the Portal already sets any of these headers from Express (e.g. via helmet), remove the
#    duplicate to avoid two values. `curl -sI` will show duplicates.
#  - Manifest/PWA: /manifest.webmanifest was flagged for cache-control; it inherits no-store
#    above, which is fine (PWAs re-fetch the manifest).
